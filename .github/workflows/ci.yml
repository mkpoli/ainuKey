name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust (stable + msvc target)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build (release)
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Test
        run: cargo test --target x86_64-pc-windows-msvc

      - name: Clippy
        run: cargo clippy --target x86_64-pc-windows-msvc -- -D warnings
        continue-on-error: true

      - name: Format check
        run: cargo fmt --check
        continue-on-error: true

  # Cross-link the actual DLL on Linux (lld-link + MSVC libs via cargo-xwin) and
  # assert the COM entry points are exported. This catches link/resource/export
  # failures that `cargo check` cannot, on cheap Ubuntu runners.
  cross-link:
    name: Cross-link DLL + verify exports (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Rust (stable + msvc target)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cross toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends llvm clang lld binutils-mingw-w64
          cargo install cargo-xwin --locked

      - name: Cross-link the DLL
        run: cargo xwin build --release --target x86_64-pc-windows-msvc

      - name: Verify the four COM entry points are exported
        run: |
          dll=target/x86_64-pc-windows-msvc/release/ainukey.dll
          test -f "$dll" || { echo "DLL not built: $dll"; exit 1; }
          file "$dll"
          objdump=$(command -v x86_64-w64-mingw32-objdump || command -v objdump)
          for fn in DllGetClassObject DllCanUnloadNow DllRegisterServer DllUnregisterServer; do
            "$objdump" -p "$dll" | grep -qw "$fn" || { echo "MISSING export: $fn"; exit 1; }
            echo "  exported: $fn"
          done
          echo "OK: ainukey.dll links and exports all four COM entry points."
