name: Release

# Build a Windows DLL and publish a downloadable package whenever a version tag
# is pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`). Can also be run
# manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable + msvc target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify DLL exports
        shell: pwsh
        continue-on-error: true
        run: |
          $dll = "target/x86_64-pc-windows-msvc/release/ainukey.dll"
          if (-not (Test-Path $dll)) { throw "DLL not built: $dll" }
          # dumpbin is not on PATH on the runner; locate it via vswhere.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $dumpbin = $null
          if (Test-Path $vswhere) {
            $vs = & $vswhere -latest -property installationPath
            $dumpbin = Get-ChildItem "$vs\VC\Tools\MSVC\*\bin\Hostx64\x64\dumpbin.exe" -ErrorAction SilentlyContinue |
                       Select-Object -First 1 -ExpandProperty FullName
          }
          if ($dumpbin) {
            $exports = & $dumpbin /nologo /exports $dll
            $exports | Select-String 'DllGetClassObject|DllCanUnloadNow|DllRegisterServer|DllUnregisterServer'
            foreach ($fn in 'DllGetClassObject','DllCanUnloadNow','DllRegisterServer','DllUnregisterServer') {
              if (-not ($exports | Select-String $fn)) { throw "Missing export: $fn" }
            }
          } else {
            Write-Host "dumpbin not found; skipping (exports are verified by the CI cross-link job)."
          }

      - name: Compute version
        id: ver
        shell: pwsh
        run: |
          $tag = if ($env:GITHUB_REF_NAME -and $env:GITHUB_REF_NAME -ne '') { $env:GITHUB_REF_NAME } else { 'dev' }
          $num = $tag -replace '^v', ''
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "num=$num" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build portable zip
        shell: pwsh
        run: |
          $stage = "dist/ainuKey"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target/x86_64-pc-windows-msvc/release/ainukey.dll $stage/
          Copy-Item install.ps1 $stage/
          Copy-Item installer/enable-user.ps1 $stage/
          Copy-Item README.md    $stage/
          Copy-Item LICENSE      $stage/
          Compress-Archive -Path "$stage/*" -DestinationPath "ainuKey-${{ steps.ver.outputs.tag }}-x86_64-windows-msvc.zip" -Force

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found at $iscc" }
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.num }}" installer\ainuKey.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compile failed" }

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          Move-Item ainuKey-*-x86_64-windows-msvc.zip   out/
          Move-Item ainuKey-*-x86_64-windows-setup.exe  out/
          Get-ChildItem out | Format-Table Name, Length

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ainuKey-windows-x64
          path: out/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          prerelease: true
